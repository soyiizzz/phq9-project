<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 리필 - 내 쿠폰함</title>
    <style>
        /* 블루(#1A3C6C)와 오렌지(#FF8C42) 테마 */
        :root { 
            --trust-blue: #1A3C6C; 
            --energy-orange: #FF8C42; 
            --light-blue: #F0F4F8; 
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--light-blue); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .coupon-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(26, 60, 108, 0.1); text-align: center; width: 100%; max-width: 380px; border: 3px dashed var(--energy-orange); position: relative; }
        
        h2 { color: var(--trust-blue); font-size: 22px; margin-top: 0; font-weight: 800; }
        .user-name { color: var(--energy-orange); font-weight: bold; }
        
        .coupon-box { background: #fff5eb; padding: 20px; border-radius: 15px; margin: 25px 0; border: 1px solid #ffe8d6; }
        .coupon-code { font-size: 26px; font-weight: 900; color: var(--trust-blue); letter-spacing: 2px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; background: var(--energy-orange); color: white; }

        .used-style .coupon-code { color: #aaa; text-decoration: line-through; }
        .used-style .status-badge { background: #ccc; }
        .used-style .coupon-box { background: #f5f5f5; border-color: #eee; }

        p { color: #666; font-size: 14px; line-height: 1.5; }
        
        .btn { background: var(--trust-blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #122b4d; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .logo-area { margin-top: 35px; padding-top: 25px; border-top: 1px solid #eee; }
        .logo-area img { width: 200px; height: auto; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="coupon-card" id="card">
    <div class="status-badge" id="badge">사용 가능</div>
    <h2 id="welcomeMsg"><span class="user-name">청년</span>님의 마음 리필</h2>
    <p>검사에 참여해주셔서 감사합니다.<br>카페 직원에게 이 화면을 보여주세요!</p>
    
    <div class="coupon-box">
        <div class="coupon-code" id="codeText">REFILL-2026</div>
    </div>
    
    <button id="useBtn" class="btn" onclick="useCoupon()">직원 확인 (사용하기)</button>
    <p style="font-size: 11px; margin-top: 15px; color: #999;">* 본 쿠폰은 1인 1회 사용 가능합니다.</p>

    <div class="logo-area">
        <img src="https://mmhwc.or.kr/img/common/logo.gif" alt="마포구정신건강복지센터">
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jiqqrhhzqalknfqnagzc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_32sXJul3D-EyGA51HqZK1A_CWjBJ95J';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const userId = localStorage.getItem('savedUserId');

    async function checkStatus() {
        if(!userId) {
            alert("검사 기록을 찾을 수 없습니다.");
            return location.href = "index.html";
        }

        const { data, error } = await supabaseClient
            .from('survey_results').select('*').eq('id', userId).single();

        if(data) {
            document.getElementById('welcomeMsg').innerHTML = `<span class="user-name">${data.name}</span>님의 마음 리필`;
            if(data.is_used) applyUsedUI();
        }
    }

    function applyUsedUI() {
        document.getElementById('card').classList.add('used-style');
        document.getElementById('badge').innerText = "사용 완료";
        document.getElementById('codeText').innerText = "USED COUPON";
        document.getElementById('useBtn').disabled = true;
        document.getElementById('useBtn').innerText = "사용 완료되었습니다";
    }

    async function useCoupon() {
        if(!confirm("직원 확인용입니다. 정말로 사용 처리할까요?")) return;

        const { error } = await supabaseClient
            .from('survey_results').update({ is_used: true }).eq('id', userId);

        if(!error) {
            alert("사용 처리가 완료되었습니다.");
            applyUsedUI();
        } else {
            alert("오류 발생: " + error.message);
        }
    }

    checkStatus();
</script>
</body>
</html>
