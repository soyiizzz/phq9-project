<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인드 커넥트 - Mind Connect</title>
    <style>
        :root { --main-color: #2e7d32; --sub-color: #e8f5e9; --accent-color: #66bb6a; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 20px auto; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 35px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { font-size: 26px; color: var(--main-color); text-align: center; margin-bottom: 10px; font-weight: 800; }
        .sub-title { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        
        /* 상태 표시바 */
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 10px; margin-bottom: 30px; position: sticky; top: 0; }
        .progress-bar { width: 0%; background: linear-gradient(to right, var(--main-color), var(--accent-color)); height: 100%; border-radius: 10px; transition: width 0.3s ease; }

        .input-group { margin-bottom: 20px; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 15px; margin-top: 8px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--main-color); outline: none; box-shadow: 0 0 8px rgba(46, 125, 50, 0.1); }

        .consent-box { background: var(--sub-color); padding: 18px; border-radius: 15px; font-size: 13px; border: 1px solid #d4edda; margin-bottom: 25px; }
        
        .question { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .question p { margin-top: 0; font-weight: 600; font-size: 16px; color: #444; }
        .options { display: grid; gap: 10px; margin-top: 15px; }
        
        label { background: #fff; padding: 14px; border-radius: 12px; cursor: pointer; border: 1px solid #eee; display: flex; align-items: center; font-size: 14px; transition: 0.2s; }
        label:hover { background: #f9f9f9; }
        input[type="radio"] { margin-right: 12px; accent-color: var(--main-color); width: 18px; height: 18px; }

        .submit-btn { background: linear-gradient(to right, var(--main-color), var(--accent-color)); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(46, 125, 50, 0.2); transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(46, 125, 50, 0.3); }

        .logo-area { text-align: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        .logo-area img { width: 180px; opacity: 0.8; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="info-section" class="container">
    <h1>Mind Connect</h1>
    <p class="sub-title">마음의 신호를 다시 연결합니다</p>
