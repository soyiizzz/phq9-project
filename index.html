<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청년 마음건강 체크 - PHQ-9</title>
    <style>
        /* 깔끔한 디자인 설정 */
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f0; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #2e7d32; font-size: 24px; text-align: center; }
        .intro { background: #e8f5e9; padding: 15px; border-radius: 10px; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        .question { margin-bottom: 25px; border-bottom: 1px dashed #eee; padding-bottom: 15px; }
        .question p { font-weight: bold; margin-bottom: 10px; }
        .options { display: grid; gap: 8px; }
        label { background: #f9f9f9; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; font-size: 14px; }
        input[type="radio"] { margin-right: 10px; accent-color: #2e7d32; }
        label:hover { background: #e8f5e9; border-color: #2e7d32; }
        .submit-btn { background: #2e7d32; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .submit-btn:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 마음건강 자가진단</h1>
    <div class="intro">
        지난 2주일 동안, 당신은 다음의 문제들로 인해 얼마나 자주 방해를 받았습니까?
    </div>

    <form id="phqForm">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="submitSurvey()">검사 완료하고 쿠폰 받기</button>
    </form>
</div>

<script>
    const questions = [
        "일 또는 여가 활동을 하는 데 흥미나 즐거움을 느끼지 못함",
        "기분이 가라앉거나, 우울하거나, 희망이 없음",
        "잠이 들거나 계속 잠을 자는 것이 어려움, 또는 잠을 너무 많이 잠",
        "피곤하다고 느끼거나 기운이 거의 없음",
        "입맛이 없거나 너무 많이 먹음",
        "자신을 부정적으로 보기 - 혹은 자신이 실패자라고 느끼거나 자신 또는 가족을 실망시켰다고 생각함",
        "신문을 읽거나 TV를 보는 것과 같은 일에 집중하는 것이 어려움",
        "다른 사람들이 알아챌 정도로 너무 느리게 움직이거나 말을 함. 또는 반대로 평상시보다 많이 움직여서 너무 안절부절못함",
        "죽는 것이 더 낫다고 생각하거나 어떤 식으로든 자해를 하려고 생각함"
    ];

    const container = document.getElementById('questions-container');

    // 문항 화면에 뿌리기
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <p>${i + 1}. ${q}</p>
            <div class="options">
                <label><input type="radio" name="q${i}" value="0" required> 전혀 방해받지 않았다</label>
                <label><input type="radio" name="q${i}" value="1"> 며칠 동안 방해받았다</label>
                <label><input type="radio" name="q${i}" value="2"> 7일 이상 방해받았다</label>
                <label><input type="radio" name="q${i}" value="3"> 거의 매일 방해받았다</label>
            </div>
        `;
        container.appendChild(div);
    });

    function submitSurvey() {
        const form = document.getElementById('phqForm');
        const formData = new FormData(form);
        let totalScore = 0;
        let answeredCount = 0;

        for (let [key, value] of formData.entries()) {
            totalScore += parseInt(value);
            answeredCount++;
        }

        if (answeredCount < 9) {
            alert("모든 문항에 답변해 주세요!");
            return;
        }

        // 결과 알림 및 쿠폰 지급 흉내내기
        alert(`검사 완료! 당신의 점수는 ${totalScore}점입니다.\n확인을 누르면 '내 쿠폰함'으로 이동합니다.`);
        
        // 실제로는 여기서 서버에 데이터를 보내고 쿠폰함으로 넘어가야 함
        location.href = "coupon.html"; 
    }
</script>

</body>
</html>
