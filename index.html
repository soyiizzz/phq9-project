<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 리필 (Mind Refill) - 청년 마음건강 체크</title>
    <meta property="og:title" content="마음 리필 (Mind Refill)">
    <meta property="og:description" content="☕️ 당신의 일상에 따뜻한 여유를 채워드릴게요">
    <meta property="og:image" content="https://mmhwc.or.kr/img/common/logo.gif">
    
    <style>
        :root { 
            --trust-blue: #1A3C6C; 
            --energy-orange: #FF8C42; 
            --light-blue: #F0F4F8; 
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--light-blue); min-height: 100vh; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(26, 60, 108, 0.1); }
        
        h1 { font-size: 28px; color: var(--trust-blue); text-align: center; margin-bottom: 5px; font-weight: 800; }
        .sub-title { text-align: center; color: #666; font-size: 15px; margin-bottom: 30px; }
        
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 10px; margin-bottom: 30px; }
        .progress-bar { width: 0%; background: var(--energy-orange); height: 100%; border-radius: 10px; transition: width 0.3s ease; }

        /* select(드롭다운) 스타일을 input과 똑같이 맞춤 */
        input[type="text"], input[type="tel"], select { width: 100%; padding: 15px; margin-top: 10px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 15px; transition: 0.3s; font-family: inherit; }
        input:focus, select:focus { border-color: var(--trust-blue); outline: none; }

        .consent-box { background: #f8f9fa; padding: 18px; border-radius: 15px; font-size: 13px; border-left: 5px solid var(--trust-blue); margin: 25px 0; }
        
        .question { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .question p { margin-top: 0; font-weight: 700; color: var(--trust-blue); }
        
        label { background: #fff; padding: 14px; border-radius: 12px; cursor: pointer; border: 1px solid #eee; display: flex; align-items: center; margin-bottom: 8px; transition: 0.2s; }
        label:hover { border-color: var(--energy-orange); background: #fffaf5; }
        input[type="radio"] { margin-right: 12px; accent-color: var(--energy-orange); width: 18px; height: 18px; }

        .submit-btn { background: var(--trust-blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(26, 60, 108, 0.2); }
        .submit-btn:hover { background: #122b4d; transform: translateY(-2px); }
        .orange-btn { background: var(--energy-orange) !important; box-shadow: 0 8px 15px rgba(255, 140, 66, 0.2) !important; }

        .logo-area { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .logo-area img { width: 200px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="info-section" class="container">
    <h1>마음 리필 (Mind Refill)</h1>
    <p class="sub-title">☕️ 당신의 일상에 따뜻한 여유를 채워드릴게요</p>
    
    <input type="text" id="userName" placeholder="성함">
    <input type="tel" id="userPhone" placeholder="연락처 (숫자만)">
    <input type="text" id="userSource" placeholder="방문하신 카페 이름">

    <select id="userRegion" onchange="toggleDongSelect()">
        <option value="">거주 지역을 선택해주세요</option>
        <option value="서울시 마포구">서울시 마포구</option>
        <option value="마포구 외 지역">마포구 외 지역</option>
    </select>

    <div id="dongSelectGroup" style="display: none;">
        <select id="userDong">
            <option value="">무슨 동에 거주하시나요?</option>
            <option value="공덕동">공덕동</option>
            <option value="아현동">아현동</option>
            <option value="도화동">도화동</option>
            <option value="용강동">용강동</option>
            <option value="대흥동">대흥동</option>
            <option value="염리동">염리동</option>
            <option value="신수동">신수동</option>
            <option value="서강동">서강동</option>
            <option value="서교동">서교동</option>
            <option value="합정동">합정동</option>
            <option value="망원1동">망원1동</option>
            <option value="망원2동">망원2동</option>
            <option value="연남동">연남동</option>
            <option value="성산1동">성산1동</option>
            <option value="성산2동">성산2동</option>
            <option value="상암동">상암동</option>
        </select>
    </div>

    <div class="consent-box">
        <h4 style="margin:0 0 5px 0;">개인정보 수집 동의</h4>
        • 항목: 이름, 연락처, 지역, 검사 결과<br>
        • 목적: 쿠폰 지급 및 결과 안내<br>
        • <span style="color:#d32f2f;">보유기간: 사업 종료 시 지체 없이 파기</span>
        <label style="border:none; padding:0; background:none; margin-top:10px;">
            <input type="checkbox" id="privacyConsent"> <b>내용을 확인했으며 동의합니다</b>
        </label>
    </div>

    <button type="button" class="submit-btn orange-btn" onclick="checkInfo()">검사 시작하고 커피 받기</button>
    
    <div class="logo-area">
        <img src="https://mmhwc.or.kr/img/common/logo.gif" alt="마포구정신건강복지센터">
    </div>
</div>

<div id="survey-section" class="container" style="display:none;">
    <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    <h2 style="color:var(--trust-blue); text-align:center;">마음 상태 체크</h2>
    <p id="progress-text" style="text-align:center; font-size:13px; color:#888; margin-bottom:20px;">9문항 중 0개 완료</p>
    
    <form id="phqForm">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="submitSurvey()">체크 완료하고 쿠폰 받기</button>
    </form>

    <div class="logo-area">
        <img src="https://mmhwc.or.kr/img/common/logo.gif" alt="마포구정신건강복지센터">
    </div>
</div>

<script>
// 1. Supabase 연결 설정 (사용자님 정보 유지)
    const SUPABASE_URL = 'https://jiqqrhhzqalknfqnagzc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_32sXJul3D-EyGA51HqZK1A_CWjBJ95J';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. 질문 목록
    const questions = [
        "일 또는 여가 활동을 하는 데 흥미나 즐거움을 느끼지 못함",
        "기분이 가라앉거나, 우울하거나, 희망이 없음",
        "잠이 들거나 계속 잠을 자는 것이 어려움, 또는 잠을 너무 많이 잠",
        "피곤하다고 느끼거나 기운이 거의 없음",
        "입맛이 없거나 너무 많이 먹음",
        "자신을 부정적으로 보기 - 혹은 자신이 실패자라고 느끼거나 자신 또는 가족을 실망시켰다고 생각함",
        "신문을 읽거나 TV를 보는 것과 같은 일에 집중하는 것이 어려움",
        "다른 사람들이 알아챌 정도로 너무 느리게 움직이거나 말을 함",
        "죽는 것이 더 낫다고 생각하거나 어떤 식으로든 자해를 하려고 생각함"
    ];

    // 3. 지역 선택 시 동 목록 보이기/숨기기
    function toggleDongSelect() {
        const region = document.getElementById('userRegion').value;
        const dongGroup = document.getElementById('dongSelectGroup');
        if (region === '서울시 마포구') {
            dongGroup.style.display = 'block';
        } else {
            dongGroup.style.display = 'none';
            document.getElementById('userDong').value = '';
        }
    }

    // 4. 정보 입력 확인 및 중복 검사 체크
    async function checkInfo() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const region = document.getElementById('userRegion').value;
        const dong = document.getElementById('userDong').value;
        const consent = document.getElementById('privacyConsent').checked;

        if(!name || !phone) return alert("이름과 연락처를 입력해주세요.");
        if(!region) return alert("거주 지역을 선택해주세요.");
        if(region === '서울시 마포구' && !dong) return alert("거주하시는 '동'을 선택해주세요.");
        if(!consent) return alert("개인정보 수집 동의가 필요합니다.");

        // Supabase 장부에서 기존 기록 확인
        const { data } = await supabaseClient
            .from('survey_results')
            .select('id')
            .eq('name', name)
            .eq('phone_number', phone);

        if (data && data.length > 0) {
            if(confirm("이미 검사하신 기록이 있습니다!\n기존 쿠폰함으로 이동하시겠습니까?")) {
                localStorage.setItem('savedUserId', data[0].id);
                location.href = "coupon.html";
                return;
            }
        }

        // 기록 없으면 설문 시작
        document.getElementById('info-section').style.display = 'none';
        document.getElementById('survey-section').style.display = 'block';
        renderQuestions();
    }

    // 5. 질문 생성 (중복 방지 로직 포함)
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = ''; // 🚨 기존 질문 싹 비우기 (무한 증식 방지)

        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question';
            div.innerHTML = `
                <p><strong>${i+1}. ${q}</strong></p>
                <div class="options">
                    ${['전혀 없음', '며칠 동안', '7일 이상', '거의 매일'].map((opt, val) => 
                        `<label><input type="radio" name="q${i}" value="${val}" onchange="updateProgress()"> ${opt}</label>`
                    ).join('')}
                </div>
            `;
            container.appendChild(div);
        });
    }

    // 6. 진행 바 업데이트
    function updateProgress() {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        const percent = (answered / questions.length) * 100;
        document.getElementById('progress').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `9문항 중 ${answered}개 완료`;
    }

    // 7. 결과 제출
    async function submitSurvey() {
        const form = document.getElementById('phqForm');
        const formData = new FormData(form);
        let totalScore = 0;
        let count = 0;
        
        for (let [key, value] of formData.entries()) {
            totalScore += parseInt(value);
            count++;
        }

        if(count < 9) return alert("모든 문항에 답변해주세요!");

        try {
            const { data, error } = await supabaseClient.from('survey_results').insert([{ 
                name: document.getElementById('userName').value,
                phone_number: document.getElementById('userPhone').value,
                source: document.getElementById('userSource').value,
                region: document.getElementById('userRegion').value,
                dong: document.getElementById('userDong').value,
                total_score: totalScore 
            }]).select();

            if (error) throw error;

            localStorage.setItem('savedUserId', data[0].id);
            location.href = "coupon.html";
        } catch (err) {
            console.error(err);
            alert("저장 실패: " + err.message + "\n(Supabase에 region, dong 칸이 있는지 확인해주세요!)");
        }
    }
</script>
</body>
</html>
