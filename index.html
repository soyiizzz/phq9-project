<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 리필 (Mind Refill) - 청년 마음건강 체크</title>
    <style>
        /* 신뢰의 블루(#1A3C6C)와 활기의 오렌지(#FF8C42) 조합 */
        :root { 
            --trust-blue: #1A3C6C; 
            --energy-orange: #FF8C42; 
            --light-blue: #F0F4F8; 
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--light-blue); min-height: 100vh; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 20px auto; background: #ffffff; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(26, 60, 108, 0.1); }
        
        h1 { font-size: 28px; color: var(--trust-blue); text-align: center; margin-bottom: 5px; font-weight: 800; }
        .sub-title { text-align: center; color: #666; font-size: 15px; margin-bottom: 30px; }
        
        /* 상태 표시바 (오렌지색 강조) */
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 10px; margin-bottom: 30px; }
        .progress-bar { width: 0%; background: var(--energy-orange); height: 100%; border-radius: 10px; transition: width 0.3s ease; }

        input[type="text"], input[type="tel"] { width: 100%; padding: 15px; margin-top: 10px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--trust-blue); outline: none; }

        .consent-box { background: #f8f9fa; padding: 18px; border-radius: 15px; font-size: 13px; border-left: 5px solid var(--trust-blue); margin: 25px 0; }
        
        .question { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .question p { margin-top: 0; font-weight: 700; color: var(--trust-blue); }
        
        label { background: #fff; padding: 14px; border-radius: 12px; cursor: pointer; border: 1px solid #eee; display: flex; align-items: center; margin-bottom: 8px; transition: 0.2s; }
        label:hover { border-color: var(--energy-orange); background: #fffaf5; }
        input[type="radio"] { margin-right: 12px; accent-color: var(--energy-orange); width: 18px; height: 18px; }

        .submit-btn { background: var(--trust-blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(26, 60, 108, 0.2); }
        .submit-btn:hover { background: #122b4d; transform: translateY(-2px); }
        .orange-btn { background: var(--energy-orange) !important; box-shadow: 0 8px 15px rgba(255, 140, 66, 0.2) !important; }

        .logo-area { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .logo-area img { width: 200px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="info-section" class="container">
    <h1>마음 리필 (Mind Refill)</h1>
    <p class="sub-title">☕️ 당신의 일상에 따뜻한 여유를 채워드릴게요</p>
    
    <input type="text" id="userName" placeholder="성함">
    <input type="tel" id="userPhone" placeholder="연락처 (숫자만)">
    <input type="text" id="userSource" placeholder="방문하신 카페 이름">

    <div class="consent-box">
        <h4 style="margin:0 0 5px 0;">개인정보 수집 동의</h4>
        • 항목: 이름, 연락처, 검사 결과<br>
        • 목적: 쿠폰 지급 및 결과 안내<br>
        • <span style="color:#d32f2f;">보유기간: 사업 종료 시 지체 없이 파기</span>
        <label style="border:none; padding:0; background:none; margin-top:10px;">
            <input type="checkbox" id="privacyConsent"> <b>내용을 확인했으며 동의합니다</b>
        </label>
    </div>

    <button type="button" class="submit-btn orange-btn" onclick="checkInfo()">검사 시작하고 커피 받기</button>
    
    <div class="logo-area">
        <img src="https://mmhwc.or.kr/img/common/logo.gif" alt="마포구정신건강복지센터">
    </div>
</div>

<div id="survey-section" class="container" style="display:none;">
    <div class="progress-container"><div id="progress" class="progress-bar"></div></div>
    <h2 style="color:var(--trust-blue); text-align:center;">마음 상태 체크</h2>
    <p id="progress-text" style="text-align:center; font-size:13px; color:#888; margin-bottom:20px;">9문항 중 0개 완료</p>
    
    <form id="phqForm">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="submitSurvey()">체크 완료하고 쿠폰 받기</button>
    </form>

    <div class="logo-area">
        <img src="https://mmhwc.or.kr/img/common/logo.gif" alt="마포구정신건강복지센터">
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jiqqrhhzqalknfqnagzc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_32sXJul3D-EyGA51HqZK1A_CWjBJ95J';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const questions = ["일 또는 여가 활동을 하는 데 흥미나 즐거움을 느끼지 못함", "기분이 가라앉거나, 우울하거나, 희망이 없음", "잠이 들거나 계속 잠을 자는 것이 어려움, 또는 잠을 너무 많이 잠", "피곤하다고 느끼거나 기운이 거의 없음", "입맛이 없거나 너무 많이 먹음", "자신을 부정적으로 보기 - 혹은 자신이 실패자라고 느끼거나 자신 또는 가족을 실망시켰다고 생각함", "신문을 읽거나 TV를 보는 것과 같은 일에 집중하는 것이 어려움", "다른 사람들이 알아챌 정도로 너무 느리게 움직이거나 말을 함", "죽는 것이 더 낫다고 생각하거나 어떤 식으로든 자해를 하려고 생각함"];

    async function checkInfo() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        if(!name || !phone) return alert("정보를 입력해주세요.");
        if(!document.getElementById('privacyConsent').checked) return alert("동의서에 체크해주세요.");

        const { data } = await supabaseClient.from('survey_results').select('id').eq('name', name).eq('phone_number', phone);
        if (data && data.length > 0) {
            if(confirm("기존 기록이 있습니다. 쿠폰함으로 이동할까요?")) {
                localStorage.setItem('savedUserId', data[0].id);
                location.href = "coupon.html"; return;
            }
        }
        document.getElementById('info-section').style.display = 'none';
        document.getElementById('survey-section').style.display = 'block';
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question';
            div.innerHTML = `<p>${i+1}. ${q}</p><div class="options">
                ${['전혀 없음', '며칠 동안', '7일 이상', '거의 매일'].map((opt, val) => 
                    `<label><input type="radio" name="q${i}" value="${val}" onchange="updateProgress()"> ${opt}</label>`
                ).join('')}
            </div>`;
            container.appendChild(div);
        });
    }

    function updateProgress() {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        document.getElementById('progress').style.width = (answered / 9 * 100) + '%';
        document.getElementById('progress-text').innerText = `9문항 중 ${answered}개 완료`;
    }

    async function submitSurvey() {
        const formData = new FormData(document.getElementById('phqForm'));
        let totalScore = 0; let count = 0;
        for (let [key, value] of formData.entries()) { totalScore += parseInt(value); count++; }
        if(count < 9) return alert("모든 문항을 체크해주세요!");

        const { data, error } = await supabaseClient.from('survey_results').insert([{ 
            name: document.getElementById('userName').value,
            phone_number: document.getElementById('userPhone').value,
            source: document.getElementById('userSource').value,
            total_score: totalScore 
        }]).select();

        if (!error) { localStorage.setItem('savedUserId', data[0].id); location.href = "coupon.html"; }
    }
</script>
</body>
</html>
